name: Test

on: [pull_request, push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [16.x, 17.x, 18.x, 19.x, 20.x, 22.x, 24.x]
        include:
          - os: macos-latest
            node-version: 16.x
          - os: macos-latest
            node-version: 18.x
          - os: macos-latest
            node-version: 20.x
          - os: macos-latest
            node-version: 22.x
          - os: macos-latest
            node-version: 24.x
          - os: windows-latest
            node-version: 16.x
          - os: windows-latest
            node-version: 18.x
          - os: windows-latest
            node-version: 20.x
          - os: windows-latest
            node-version: 22.x
          - os: windows-latest
            node-version: 24.x

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: node test/ci.js
      - run: node test/testAll.js
